name: Docker build (engine)

on:
  push:
    branches: [main, master]
    paths:
      - "config/Dockerfile"
      - "scripts/setup/**"
      - "patches/**"
  pull_request:
    paths:
      - "config/Dockerfile"
      - "scripts/setup/**"
      - "patches/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # Hosted larger runner provisioned in org settings, named "docker-build".
    # Needed for disk space: this build's final image is ~30GB, well past
    # the 14GB standard-runner limit.
    runs-on: docker-build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/Dockerfile
          platforms: linux/amd64
          build-args: |
            BUILD_TYPE=minimal
            BUILD_JOBS=4
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Hosted runners are ephemeral (fresh VM each run), so BuildKit's
          # local disk cache doesn't persist between runs like it would on
          # self-hosted. This pulls/pushes the layer cache to GHCR instead,
          # so unchanged stages (e.g. Boost/Kaldi/Marian if only a later
          # script changed) still skip recompilation.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
