name: Docker build (engine)

on:
  push:
    branches: [main, master]
    paths:
      - "config/Dockerfile"
      - "scripts/setup/**"
      - "patches/**"
  pull_request:
    paths:
      - "config/Dockerfile"
      - "scripts/setup/**"
      - "patches/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest-m
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-latest-arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_TYPE=minimal
            BUILD_JOBS=4
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.suffix }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.suffix }},mode=max
